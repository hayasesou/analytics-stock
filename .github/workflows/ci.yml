name: ci

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check file size budgets
        run: python3 scripts/check_file_sizes.py

      - name: Install worker deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run worker tests (except live)
        run: |
          pytest -q tests -m "not llm_live"

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Check file size budgets
        run: python3 scripts/check_file_sizes.py

      - name: Install web deps
        run: npm ci

      - name: Build web
        run: npm run build
