name: nightly-llm-live

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  worker-llm-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run live LLM tests
        working-directory: worker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          RUN_LLM_LIVE: "1"
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set. Skip live LLM tests."
            exit 0
          fi
          pytest -q -m llm_live tests/test_llm_reporting_live.py
