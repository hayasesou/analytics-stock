version: 1.1
baseline: frozen

timezone: Asia/Tokyo

schedules:
  daily:
    cron: "0 20 * * *"
    job: jobs.daily
  weekly:
    cron: "30 6 * * 6"
    job: jobs.weekly

markets:
  jp:
    name: TSE Common Stocks
    universe: jp_tse_common
    code_format: "^[0-9]{4}$"
    dcf:
      wacc: 0.075
      perpetual_growth: 0.01
  us:
    name: S&P 500
    universe: us_sp500
    dcf:
      wacc: 0.09
      perpetual_growth: 0.02

ranking:
  top_n: 50
  hard_min:
    jp: 10
    us: 10
  eligibility:
    exclude_flags:
      - low_liquidity
      - severe_corporate_action
      - data_quality_fail

scoring:
  normalization: percentile_within_market
  styles:
    - quality
    - growth
    - value
    - momentum
    - catalyst
  weights:
    quality: 0.25
    growth: 0.20
    value: 0.20
    catalyst: 0.25
    momentum: 0.10
  penalties:
    missing_ratio_threshold: 0.2
    missing_ratio_penalty: 8.0
    low_liquidity_penalty: 100.0

confidence:
  high:
    min_primary_sources: 2
    requires_key_numbers_with_citations: true
    requires_no_major_contradiction: true
    max_missing_ratio: 0.15

signals:
  enable: true
  b_mode:
    requires_confidence: High
    max_rank: 10
    event_boost_optional: true
    valid_until_next_weekly: true
  entry_cap_per_week:
    normal: 3
    extra_if_exception_met: 2
    risk_alert_mode: 1

risk_alert_mode:
  trigger:
    max_drawdown_breach: -0.10
    manual_override: true
  behavior:
    entry_cap_per_week: 1
    reduce_sector_exposure: true
    defensive_allocation_bias: true

risk_management:
  atr:
    period: 14
    initial_stop_multiple: 2.5
    trailing_stop_multiple: 3.0
    partial_take_profit:
      enabled: true
      threshold: 0.20
      ratio: 0.5
    prioritize_fundamental_deterioration_exit: true

backtest:
  order_model:
    entry: next_business_day_open
  costs:
    zero:
      jp_round_trip_one_way: 0.0
      us_round_trip_one_way: 0.0
    standard:
      jp_round_trip_one_way: 0.001
      us_round_trip_one_way: 0.0008
    strict:
      jp_round_trip_one_way: 0.0015
      us_round_trip_one_way: 0.0012
  default_cost_profile: strict
  metrics:
    - cagr
    - max_dd
    - sharpe
    - sortino
    - volatility
    - win_rate
    - avg_win
    - avg_loss
    - alpha_simple
    - information_ratio_simple

reporting:
  include_sections:
    - weekly_summary
    - top50_ranking
    - security_report
    - dcf_top10
    - next_watch_points
  claim_id_prefix: C
  enforce_citation_for_important_claims: true
  downgrade_uncited_to_hypothesis: true

rag:
  index_scope: evidence_vault_only
  chunk_chars: 1200
  overlap_chars: 150
  top_k: 8

budget_guard:
  per_security:
    max_documents: 12
    max_pdf_extract_chars: 80000
  monthly:
    llm_budget_usd_env: LLM_MONTHLY_BUDGET_USD
    fallback_mode: simplify_summaries

storage:
  cloud_only: true
  evidence_vault_persistence: permanent
  uncited_cache_ttl_days: 90
  neon:
    store:
      - runs
      - results
      - citations
      - chat_logs
      - limited_embeddings
  r2:
    store:
      - source_documents
      - extracted_text
      - price_parquet
      - backtest_artifacts

notifications:
  discord:
    daily:
      high: detailed
      medium: short
      low: count_only
    weekly:
      - top50_link
      - weekly_summary_link
      - backtest_link

discord_ingest:
  enabled: true
  inbox_channel_name: inbox
  max_urls_per_message: 3
  reply_in_thread: true
  allow_bot_messages: false
  message_dedupe_cache_size: 5000
  url_dedupe_window_sec: 300
  allowed_guild_ids: []

discord_research:
  enabled: true
  auto_thread: true
  max_urls_per_message: 5

research_chat:
  poll_interval_sec: 5
  batch_size: 20

data_sources:
  jp_prices: jquants_light
  us_prices: massive_stocks_starter
  fx_usdjpy: fred
  jp_disclosure:
    - tdnet_scraping
    - edinet_api
  us_disclosure: sec_edgar

data_quality:
  weekly:
    enabled: true
    lookback_days: 14
    min_coverage_ratio:
      JP: 0.90
      US: 0.90

strategy_factory:
  enabled: true
  max_parallel_tasks: 5
  candidate_limit: 20
  validation:
    enabled: true
    lookback_days: 900
    train_days: 252
    test_days: 63
    step_days: 63
    warmup_days: 40
    execution_buffer_days: 70
    momentum_quantile: 0.65
    max_volatility_20d: 0.80
    min_signal_gap_days: 5
    min_signals_per_fold: 2
    primary_cost_profile: strict
    strict_cost_profile: strict
    gates:
      min_fold_count: 3
      min_total_trades: 8
      min_median_sharpe: 0.30
      min_mean_sharpe: 0.20
      min_worst_max_dd: -0.25
      min_strict_median_sharpe: 0.10
      require_positive_mean_cagr: false
  escalation:
    lightweight_model: gpt-5-mini
    heavy_model: gpt-5-pro
  agent_roles:
    - strategy_design
    - coding
    - feature_engineering
    - risk_evaluation
    - orchestration
  candidate_gate:
    require_robust_backtest: true
    require_manual_approval_to_live: true
  lifecycle:
    enabled: true
    evaluation_lookback_days: 365
    auto_promote_candidate_to_paper: true
    live_candidate_gate:
      max_drawdown_breach: -0.03
      min_sharpe_20d: 0.0
    paper_requirements:
      crypto:
        min_days: 14
        min_round_trips: 50
      equities:
        min_days: 60
        min_round_trips: 10
  fundamental_overlay:
    enabled: true
    screening_allow_ratings:
      - A
      - B
    screening_pass_status: candidate
    screening_block_status: draft

agents:
  adapter:
    mode: builtin
    openclaw_poc:
      enabled: false
      strategy_design_only: true
      max_retries: 2
      retry_backoff_sec: 0.05
      simulated_latency_ms: 120
      simulated_jitter_ms: 30
      simulated_failure_rate: 0.10
      deterministic: true
      cost_usd_per_task: 0.07
      fallback_to_builtin_on_error: true
      command: ""
      timeout_sec: 8
  evaluation:
    samples: 20
    attempts_per_sample: 3
    output_path: docs/openclaw-evaluation.md
    go_no_go:
      max_failure_rate: 0.10
      min_reproducibility: 0.85
      max_latency_ratio_vs_builtin: 2.0
      max_cost_ratio_vs_builtin: 1.5

edge_radar:
  enabled: true
  notify:
    top_n: 10
  equities:
    run_hour_jst: 20
    run_minute_jst: 10
    max_candidates: 50
    entry_threshold_bps: 2.0
    expected_cost_bps:
      JP_EQ: 8.0
      US_EQ: 10.0
  crypto:
    run_minute_jst: 5
    max_candidates: 20
    entry_threshold_bps: 1.5
    expected_cost_bps: 12.0
    strategy_defaults:
      perp_perp:
        ewma_alpha: 0.2
        z_entry: 2.0
        z_exit: 0.6
        z_signal_scale_bps: 2.5
        entry_min_edge_bps: 0.8
        fee_bps: 4.0
        slippage_bps: 3.0
        borrow_bps: 0.0
        min_liquidity_score: 0.35
        min_liquidation_distance_pct: 0.15
        epsilon_notional_usd: 10.0
        target_notional_usd: 1000.0
        timeout_sec: 30
        score_per_bps: 3.0
      cash_carry:
        ewma_alpha: 0.2
        z_entry: 1.8
        z_exit: 0.5
        z_signal_scale_bps: 2.0
        basis_entry_bps: 8.0
        basis_exit_bps: 3.0
        entry_min_edge_bps: 0.8
        fee_bps: 4.0
        slippage_bps: 3.0
        borrow_bps: 0.0
        min_liquidity_score: 0.35
        min_liquidation_distance_pct: 0.15
        epsilon_notional_usd: 10.0
        target_notional_usd: 1000.0
        timeout_sec: 30
        score_per_bps: 3.0
    intent_generation:
      enabled: true
      status: proposed
      portfolio_name: crypto_arb
      base_currency: USD
      max_new_intents_per_run: 5
      lookback_minutes: 180
      min_edge_score: 55.0
      min_confidence: 0.55
      require_positive_expected_edge: true
      broker_map:
        CRYPTO: crypto_gateway
  formula:
    combined_weight: 0.55
    legacy_edge_weight: 0.45
    signal_scale_bps: 0.30
    confidence_multiplier:
      High: 1.0
      Medium: 0.75
      Low: 0.5
    source_boost_bps_per_primary: 0.8
    max_source_boost_bps: 4.0
    contradiction_penalty_bps: 5.0
    missing_penalty_bps_per_10pct: 1.0
    score_per_bps: 3.0
    crypto_sharpe_bps_factor: 10.0
    crypto_cagr_bps_factor: 80.0
    crypto_drawdown_penalty_bps_factor: 25.0
    crypto_status_bonus_bps:
      candidate: 0.0
      approved: 0.5
      paper: 1.0
      live: 2.0

crypto_marketdata:
  enabled: true
  run_minute_jst: 3
  quality_window_sec: 60
  pairs:
    - symbol: BTC
      binance_symbol: BTCUSDT
      hyperliquid_symbol: BTC
      collect_spot: true
      collect_perp: true
      binance_enabled: true
      hyperliquid_enabled: true
    - symbol: ETH
      binance_symbol: ETHUSDT
      hyperliquid_symbol: ETH
      collect_spot: true
      collect_perp: true
      binance_enabled: true
      hyperliquid_enabled: true
    - symbol: SOL
      binance_symbol: SOLUSDT
      hyperliquid_symbol: SOL
      collect_spot: true
      collect_perp: true
      binance_enabled: true
      hyperliquid_enabled: true
    - symbol: HYPE
      binance_symbol: HYPEUSDT
      hyperliquid_symbol: HYPE
      collect_spot: false
      collect_perp: true
      binance_enabled: false
      hyperliquid_enabled: true
    - symbol: BNB
      binance_symbol: BNBUSDT
      hyperliquid_symbol: BNB
      collect_spot: true
      collect_perp: true
      binance_enabled: true
      hyperliquid_enabled: false
    - symbol: USDC
      binance_symbol: USDCUSDT
      hyperliquid_symbol: USDC
      collect_spot: true
      collect_perp: false
      binance_enabled: true
      hyperliquid_enabled: false
  binance:
    enabled: true
    rest_timeout_sec: 5.0
    ws_timeout_sec: 1.5
  hyperliquid:
    enabled: true
    rest_timeout_sec: 5.0
    ws_timeout_sec: 1.5
  data_quality:
    max_missing_ratio: 0.25
    max_latency_ms: 3000
    lookback_minutes: 60

youtube_ingest:
  enabled: true
  request_timeout_sec: 8
  retry_count: 2
  max_comments: 20000
  max_comment_pages: 200
  max_comment_duration_sec: 600
  max_claims: 5
  min_claim_chars: 20
  idea_priority: 80
  task_priority: 30
  created_by: discord-user

execution:
  order_reconcile:
    enabled: true
    min_abs_delta_qty: 0.0
    min_abs_delta_notional: 0.0
    open_order_policy: skip
    net_notional_epsilon: 10.0
    neutrality_strategy_types:
      - perp_perp
      - cash_carry
      - pair
      - stat_arb
  gateway_jp:
    enabled: true
    broker_name: gateway_jp
    base_url: http://gateway-jp:8081
    auth_token_env: JP_GATEWAY_AUTH_TOKEN
    request_timeout_sec: 8
    wait_timeout_sec: 2
  gateway_us:
    enabled: true
    broker_name: gateway_us
    base_url: http://gateway-us:8090
    auth_token_env: US_GATEWAY_AUTH_TOKEN
    request_timeout_sec: 8
    default_order_timeout_sec: 20
  gateway_crypto:
    enabled: true
    broker_name: crypto_gateway
    base_url: http://gateway-crypto:8080
    auth_token_env: CRYPTO_GATEWAY_AUTH_TOKEN
    request_timeout_sec: 8
    default_leg_timeout_sec: 30
  data_quality:
    enabled: true
    reject_on_missing_price: true
    max_price_staleness_days:
      JP: 7
      US: 7
      CRYPTO: 2
  risk_gate:
    max_drawdown_breach: -0.03
    min_sharpe_20d: 0.0
    rolling_sharpe_window_days: 20
  strategy_risk_gate:
    enabled: true
    max_drawdown_breach: -0.03
    warning_sharpe_threshold: 0.3
    warning_consecutive_days: 3
    halt_sharpe_threshold: 0.0
    halt_consecutive_days: 2
    cooldown_hours: 24
    panic_close_on_halt: true
    symbol_lookback_days: 30
  fundamental_overlay:
    enabled: true
    allow_if_missing: true
    trade_allow_ratings:
      - A
      - B
    size_multiplier_by_rating:
      A: 1.0
      B: 0.6
      C: 0.0
  order_controls:
    idempotency_required: true
    enforce_pretrade_checks: true
  deployment:
    allow_auto_promotion_to_live: false
